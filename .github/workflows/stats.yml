name: stats

on:
  schedule:
    - cron: "17 6 * * *" # diário, 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gerar stats.svg
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: node scripts/gen-stats.mjs

      - name: Commitar se mudou
        run: |
          if [[ -n "$(git status --porcelain assets/stats.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/stats.svg
            git commit -m "chore: refresh stats [skip ci]"
            git push
          else
            echo "sem mudança no stats.svg"
          fi
